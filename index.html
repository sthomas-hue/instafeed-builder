<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InstaFeed Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: system-ui, sans-serif; }
    .post-card { transition: all 0.3s; }
    .post-card:hover { transform: scale(1.05); }
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; z-index: 1000; }
  </style>
</head>
<body class="bg-gray-50">

<div class="max-w-6xl mx-auto p-8">
  <h1 class="text-4xl font-bold text-center mb-2">InstaFeed Builder</h1>
  <p class="text-center text-gray-600 mb-8">Enter username → Generate → Copy embed code</p>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
    <!-- Controls -->
    <div class="bg-white p-8 rounded-3xl shadow">
      <div class="space-y-6">
        <div>
          <label class="block text-sm font-medium mb-2">Instagram Username</label>
          <input id="username" type="text" value="claireglobal" 
                 class="w-full border rounded-2xl px-5 py-4 text-lg focus:outline-none focus:border-pink-500">
        </div>

        <button onclick="generateFeed()" 
                class="w-full bg-gradient-to-r from-pink-500 to-purple-600 text-white font-semibold py-5 rounded-2xl text-lg">
          Generate Preview
        </button>

        <button onclick="copyEmbedCode()" 
                class="w-full border-2 border-gray-300 py-5 rounded-2xl font-semibold">
          📋 Copy Webflow Embed Code
        </button>
      </div>
    </div>

    <!-- Preview -->
    <div class="bg-white p-8 rounded-3xl shadow">
      <h3 class="font-semibold mb-6 flex items-center gap-3">
        <i class="fa-brands fa-instagram text-3xl text-pink-500"></i>
        Live Preview
      </h3>
      <div id="preview" class="min-h-[500px] bg-gray-100 rounded-2xl p-4"></div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox" class="lightbox">
  <div class="relative max-w-2xl w-full mx-4">
    <button onclick="closeLightbox()" class="absolute -top-4 -right-4 bg-white text-black w-10 h-10 rounded-full text-3xl shadow">×</button>
    <img id="lightbox-img" class="w-full rounded-3xl" alt="">
  </div>
</div>

<script>
  let currentPosts = [];

  async function generateFeed() {
    const username = document.getElementById('username').value.trim() || 'claireglobal';
    const preview = document.getElementById('preview');

    preview.innerHTML = `<div class="flex items-center justify-center h-64"><i class="fa fa-spinner fa-spin text-4xl text-pink-500"></i></div>`;

    // Demo data (reliable)
    currentPosts = Array.from({length: 12}, (_, i) => ({
      image: `https://picsum.photos/id/${180 + i}/600/600`,
      likes: 1200 + Math.floor(Math.random() * 8000)
    }));

    let html = `<div class="grid grid-cols-1 md:grid-cols-3 gap-4">`;
    
    currentPosts.forEach((post, index) => {
      html += `
        <div onclick="openLightbox('${post.image}')" class="post-card bg-white rounded-2xl overflow-hidden shadow cursor-pointer">
          <img src="${post.image}" class="w-full aspect-square object-cover">
          <div class="p-3 text-xs flex justify-between text-gray-500">
            <span>${post.likes.toLocaleString()} likes</span>
            <span class="text-pink-500">@${username}</span>
          </div>
        </div>`;
    });
    
    html += `</div>`;
    preview.innerHTML = html;
  }

  function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').style.display = 'flex';
  }

  function closeLightbox() {
    document.getElementById('lightbox').style.display = 'none';
  }

  function copyEmbedCode() {
    const username = document.getElementById('username').value.trim() || 'claireglobal';
    
    const embedCode = `<!-- Instagram Feed Embed -->
<div id="insta-feed"></div>

<script>
(async function() {
  const username = "${username}";
  const container = document.getElementById('insta-feed');
  
  // Demo posts (replace with real fetch in production)
  const posts = Array.from({length: 12}, (_, i) => ({
    image: \`https://picsum.photos/id/\${180 + i}/600/600\`
  }));

  let html = '<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px;">';
  posts.forEach(p => {
    html += \`
      <div style="background:white; border-radius:16px; overflow:hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        <img src="\${p.image}" style="width:100%; height:auto; display:block;">
      </div>\`;
  });
  html += '</div>';
  container.innerHTML = html;
})();
<\/script>`;

    navigator.clipboard.writeText(embedCode);
    alert("✅ Embed code copied! Paste it into Webflow.");
  }

  // Load initial preview
  window.onload = generateFeed;
</script>
</body>
</html>
